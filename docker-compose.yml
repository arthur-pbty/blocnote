services:
  blocnote-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    container_name: blocnote-dev
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: development

  blocnote-prod:
    profiles: ["prod"]
    build:
      context: .
      target: runner
    container_name: blocnote-prod
    restart: unless-stopped
    ports:
      - "3016:3000"
    env_file:
      - .env
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
